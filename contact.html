<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QZ Contact</title>
    <link rel="stylesheet" href="./qamar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <nav>
        <div class="nav-items">
            <div class="logo">
                <img class="logo-img" src="./images/logo.png" alt="QZ Logo">
            </div>

            <div class="nav-links">
                <ul>
                    <li><a href="./qamar.html">Home</a></li>
                    <li><a href="./about.html">About Us</a></li>
                    <li><a href="./contact.html">Contact Us</a></li>
                </ul>
            </div>

            <div class="nav-btn">
                <a href="./login.html"><button class="btn-1">Log In</button></a>
                <a href="./signup.html"><button class="btn-2">Sign Up</button></a>
            </div>
        </div>
    </nav>

    <section class="contact-container">
        <div class="contact-header">
            <h1>Get In Touch</h1>
            <p>Have questions? We'd love to hear from you.</p>
        </div>

        <div class="contact-content">
            <div class="contact-form">
                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" rows="5" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 20px; font-family: inherit;"></textarea>
                    <button type="submit" class="form-btn">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <h3>Connect With Us</h3>
                <p>Follow us on our social media platforms for the latest updates and offers.</p>
                <div class="social-icons-grid">
                    <a href="#" class="fa fa-facebook"></a>
                    <a href="#" class="fa fa-instagram"></a>
                    <a href="#" class="fa fa-snapchat"></a>
                    <a href="#" class="fa fa-linkedin"></a>
                    <a href="#" class="fa fa-youtube"></a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer">
            <div class="footer-links">
                <p><strong>Contact Info</strong></p>
                <p><i class="fa fa-envelope"></i> info@qzstore.com</p>
                <p><i class="fa fa-phone"></i> +92 300 1234567</p>
            </div>
            <div class="footer-links">
                <p><strong>Working Hours</strong></p>
                <p>Mon - Sat: 9am - 9pm</p>
                <p>Sunday: Closed</p>
            </div>
        </div>
    </footer>
</body>
</html>
